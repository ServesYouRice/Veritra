services:
  messenger:
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      PRIVATE_MESSENGER_ADDR: ":8080"
      PRIVATE_MESSENGER_DATA_DIR: /data
    volumes:
      - messenger-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  caddy:
    image: caddy:2
    profiles: ["caddy"]
    depends_on:
      - messenger
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  messenger-data:
  caddy-data:
  caddy-config:


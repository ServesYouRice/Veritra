<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veritra Setup</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f7f8; color: #162024; }
      main { width: min(560px, calc(100vw - 32px)); background: #fff; border: 1px solid #d8e1e5; border-radius: 8px; padding: 24px; box-shadow: 0 12px 28px rgb(20 38 44 / 10%); }
      h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
      p { margin: 0 0 14px; color: #526269; line-height: 1.45; }
      code { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
      @media (prefers-color-scheme: dark) { body { background: #101719; color: #edf5f7; } main { background: #172124; border-color: #314045; } p { color: #a7b7bd; } }
    </style>
  </head>
  <body>
    <main>
      <h1>Setup Requires A Crypto Client</h1>
      <p>The browser setup form is disabled because production setup must create a real device key package locally.</p>
      <p>Use a client that implements production crypto and call <code>POST /api/v1/setup/owner</code> with a real <code>device_key_package</code>.</p>
    </main>
  </body>
</html>
